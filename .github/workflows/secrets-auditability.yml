# `name` is the title GitHub shows for this workflow in the Actions tab.
name: Auditability Control

# `on` tells GitHub which events should start this workflow.
on:
  # `pull_request` means this workflow runs when someone opens or updates a pull request.
  pull_request:
    # `branches` limits the trigger to pull requests aimed at protected branches.
    branches:
      # `main` is the shared branch this demo protects with required checks.
      - main
  # `merge_group` lets this check run when GitHub merge queue is used.
  merge_group:
  # `workflow_dispatch` lets an authorized user start the workflow manually.
  workflow_dispatch:

# `permissions` gives the workflow the minimum repository access it needs.
permissions:
  # `contents: read` lets this job read source files, but not write code back.
  contents: read

# `jobs` is the list of checks GitHub will run for this workflow.
jobs:
  # `auditability` is the control that produces a record of what ran and what happened.
  auditability:
    # `name` is the required check name that appears on the pull request.
    name: Auditability - enforcement evidence
    # `runs-on` chooses the temporary GitHub-hosted machine that runs this job.
    runs-on: ubuntu-latest
    # `steps` are the ordered actions GitHub performs for this control.
    steps:
      # This step downloads the pull request code onto the temporary runner.
      - name: Check out code
        # `uses` runs a reusable GitHub Action maintained by GitHub.
        uses: actions/checkout@v6
        # `with` provides settings for the checkout action.
        with:
          # `fetch-depth: 0` gets full git history so the audit report can include changed files.
          fetch-depth: 0

      # GitHub can only use `needs` between jobs in the same file, so this separate workflow reruns the controls for audit evidence.
      # This step reruns the two security controls so this separate teaching file can audit their results.
      - name: Collect control results
        # `id` gives later steps a name they can use to read this step's outputs.
        id: controls
        # `run` executes shell commands on the temporary runner.
        run: |
          # `set +e` lets the script continue after a control fails so audit evidence can still be produced.
          set +e

          # This command reruns the explainability check and stores its detailed evidence.
          python scripts/validate_security_intent.py \
            --event "$GITHUB_EVENT_PATH" \
            --output evidence/audit-explainability.json \
            --summary "$GITHUB_STEP_SUMMARY"
          explainability_exit_code=$?

          # This command reruns the prevention check and stores its detailed evidence with redacted findings.
          python scripts/secret_scan.py \
            --event "$GITHUB_EVENT_PATH" \
            --redact \
            --output evidence/audit-secret-scan.json \
            --summary "$GITHUB_STEP_SUMMARY"
          prevention_exit_code=$?

          # This block converts the explainability command exit code into a GitHub step output.
          if [ "$explainability_exit_code" -eq 0 ]; then
            echo "explainability_result=success" >> "$GITHUB_OUTPUT"
          else
            echo "explainability_result=failure" >> "$GITHUB_OUTPUT"
          fi

          # This block converts the prevention command exit code into a GitHub step output.
          if [ "$prevention_exit_code" -eq 0 ]; then
            echo "prevention_result=success" >> "$GITHUB_OUTPUT"
          else
            echo "prevention_result=failure" >> "$GITHUB_OUTPUT"
          fi

      # This step creates the audit evidence that security reviewers can inspect later.
      - name: Generate enforcement evidence
        # `run` executes shell commands on the temporary runner.
        run: |
          # This script combines the control results into Markdown and JSON evidence.
          # `--explainability-result` passes the explainability result captured above.
          # `--prevention-result` passes the secret scan result captured above.
          # `--output-dir` chooses where the evidence files are written.
          # `--summary` writes a human-readable audit record into the GitHub job summary page.
          python scripts/audit_report.py \
            --explainability-result "${{ steps.controls.outputs.explainability_result }}" \
            --prevention-result "${{ steps.controls.outputs.prevention_result }}" \
            --output-dir evidence \
            --summary "$GITHUB_STEP_SUMMARY"

      # This step preserves the audit report for reviewers and auditors.
      - name: Upload enforcement evidence
        # `if: always()` means evidence is uploaded even when a required control fails.
        if: always()
        # This action uploads files from the runner so reviewers can download them from the workflow run.
        uses: actions/upload-artifact@v6
        # `with` provides settings for the upload action.
        with:
          # `name` is the downloadable artifact label shown in GitHub.
          name: security-enforcement-evidence
          # `path` lists the evidence files created by the audit workflow.
          # The Markdown file is human-readable; the JSON files are machine-readable.
          path: |
            evidence/security-audit-report.md
            evidence/security-audit-report.json
            evidence/audit-explainability.json
            evidence/audit-secret-scan.json
          # `if-no-files-found: error` fails the job if audit evidence was not created.
          if-no-files-found: error
          # `retention-days` controls how long GitHub keeps this evidence artifact.
          retention-days: 30

      # This final step makes the auditability check fail when a required control failed.
      - name: Fail if a required control failed
        # This condition runs only when the captured control results are not both successful.
        if: steps.controls.outputs.explainability_result != 'success' || steps.controls.outputs.prevention_result != 'success'
        # `run` executes shell commands on the temporary runner.
        run: |
          # This message explains why the workflow is failing the pull request.
          echo "One or more required security controls failed. See the enforcement evidence artifact."
          # `exit 1` marks this job as failed, which blocks merge when the check is required.
          exit 1
