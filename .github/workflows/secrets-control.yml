# `name` is the title GitHub shows for this workflow in the Actions tab.
name: Secrets Control Demo

# `on` tells GitHub which events should start this workflow.
on:
  # `pull_request` means this workflow runs when someone opens or updates a pull request.
  pull_request:
    # `branches` limits the pull request trigger to changes aimed at specific protected branches.
    branches:
      # `main` is the shared branch this demo protects with required checks.
      - main
  # `merge_group` lets these same checks run when GitHub merge queue is used.
  merge_group:
  # `workflow_dispatch` lets an authorized user start the workflow manually from GitHub.
  workflow_dispatch:

# `permissions` gives the workflow the minimum repository access it needs.
permissions:
  # `contents: read` lets the jobs read source files, but not write code back to the repository.
  contents: read

# `jobs` is the list of security controls GitHub will run.
jobs:
  # `explainability` is the first control: require the PR author to explain security intent.
  explainability:
    # `name` is the check name that appears on the pull request.
    name: Explainability - PR security intent
    # `runs-on` chooses the temporary GitHub-hosted machine that runs this job.
    runs-on: ubuntu-latest
    # `steps` are the ordered actions GitHub performs for this control.
    steps:
      # This step downloads the pull request code onto the temporary runner.
      - name: Check out code
        # `uses` runs a reusable GitHub Action maintained by GitHub.
        uses: actions/checkout@v4

      # This step checks whether the PR body includes a complete security explanation.
      - name: Validate security intent in PR body
        # `run` executes shell commands on the temporary runner.
        run: |
          # This script reads the GitHub pull request event and validates the security intent fields.
          # `--event` points the script at GitHub's pull request metadata, including the PR body.
          # `--output` writes machine-readable evidence for later review or audit.
          # `--summary` writes a human-readable result into the GitHub job summary page.
          python scripts/validate_security_intent.py \
            --event "$GITHUB_EVENT_PATH" \
            --output evidence/explainability.json \
            --summary "$GITHUB_STEP_SUMMARY"

      # This step preserves the explainability result even if the check fails.
      - name: Upload explainability evidence
        # `if: always()` means evidence is uploaded on both pass and fail outcomes.
        if: always()
        # This action uploads a file from the runner so reviewers can download it from the workflow run.
        uses: actions/upload-artifact@v4
        # `with` provides settings for the upload action.
        with:
          # `name` is the downloadable artifact label shown in GitHub.
          name: explainability-evidence
          # `path` is the evidence file created by the validation script.
          path: evidence/explainability.json
          # `if-no-files-found: ignore` avoids hiding the original validation failure with an upload failure.
          if-no-files-found: ignore
          # `retention-days` controls how long GitHub keeps this evidence artifact.
          retention-days: 14

  # `secret_prevention` is the second control: block secret-like values before merge.
  secret_prevention:
    # `name` is the check name that appears on the pull request.
    name: Prevention - secret scan
    # `runs-on` chooses the temporary GitHub-hosted machine that runs this job.
    runs-on: ubuntu-latest
    # `steps` are the ordered actions GitHub performs for this control.
    steps:
      # This step downloads the pull request code onto the temporary runner.
      - name: Check out code
        # `uses` runs a reusable GitHub Action maintained by GitHub.
        uses: actions/checkout@v4
        # `with` provides settings for the checkout action.
        with:
          # `fetch-depth: 0` gets full git history so the scanner can compare pull request changes accurately.
          fetch-depth: 0

      # This step scans the pull request files for secret-like values.
      - name: Scan changed files for secrets
        # `run` executes shell commands on the temporary runner.
        run: |
          # This script inspects changed files and fails the job if it finds a secret-like value.
          # `--event` points the script at GitHub's pull request metadata and commit range.
          # `--redact` hides matched secret-like values in output so the evidence does not leak them.
          # `--output` writes machine-readable evidence for later review or audit.
          # `--summary` writes a human-readable result into the GitHub job summary page.
          python scripts/secret_scan.py \
            --event "$GITHUB_EVENT_PATH" \
            --redact \
            --output evidence/secret-scan.json \
            --summary "$GITHUB_STEP_SUMMARY"

      # This step preserves the secret scan result even if the check fails.
      - name: Upload secret scan evidence
        # `if: always()` means evidence is uploaded on both pass and fail outcomes.
        if: always()
        # This action uploads a file from the runner so reviewers can download it from the workflow run.
        uses: actions/upload-artifact@v4
        # `with` provides settings for the upload action.
        with:
          # `name` is the downloadable artifact label shown in GitHub.
          name: secret-scan-evidence
          # `path` is the evidence file created by the secret scan script.
          path: evidence/secret-scan.json
          # `if-no-files-found: ignore` avoids hiding the original scan failure with an upload failure.
          if-no-files-found: ignore
          # `retention-days` controls how long GitHub keeps this evidence artifact.
          retention-days: 14

  # `auditability` is the third control: produce a record of what ran and what happened.
  auditability:
    # `name` is the check name that appears on the pull request.
    name: Auditability - enforcement evidence
    # `runs-on` chooses the temporary GitHub-hosted machine that runs this job.
    runs-on: ubuntu-latest
    # `needs` makes this job wait for the controls it summarizes.
    needs:
      # The audit job records the result of the explainability control.
      - explainability
      # The audit job records the result of the secret prevention control.
      - secret_prevention
    # `if: always()` means this job still runs when an earlier security control fails.
    if: always()
    # `steps` are the ordered actions GitHub performs for this control.
    steps:
      # This step downloads the pull request code onto the temporary runner.
      - name: Check out code
        # `uses` runs a reusable GitHub Action maintained by GitHub.
        uses: actions/checkout@v4
        # `with` provides settings for the checkout action.
        with:
          # `fetch-depth: 0` gets full git history so the audit report can include changed files.
          fetch-depth: 0

      # This step creates the audit evidence that security reviewers can inspect later.
      - name: Generate enforcement evidence
        # `run` executes shell commands on the temporary runner.
        run: |
          # This script combines the earlier check results into Markdown and JSON evidence.
          # `--explainability-result` passes the explainability job result, such as success or failure.
          # `--prevention-result` passes the secret scan job result, such as success or failure.
          # `--output-dir` chooses where the evidence files are written.
          # `--summary` writes a human-readable audit record into the GitHub job summary page.
          python scripts/audit_report.py \
            --explainability-result "${{ needs.explainability.result }}" \
            --prevention-result "${{ needs.secret_prevention.result }}" \
            --output-dir evidence \
            --summary "$GITHUB_STEP_SUMMARY"

      # This step preserves the audit report for reviewers and auditors.
      - name: Upload enforcement evidence
        # `if: always()` means evidence is uploaded even when another required control fails.
        if: always()
        # This action uploads files from the runner so reviewers can download them from the workflow run.
        uses: actions/upload-artifact@v4
        # `with` provides settings for the upload action.
        with:
          # `name` is the downloadable artifact label shown in GitHub.
          name: security-enforcement-evidence
          # `path` lists the evidence files created by the audit report script.
          # The Markdown file is human-readable; the JSON file is machine-readable.
          path: |
            evidence/security-audit-report.md
            evidence/security-audit-report.json
          # `if-no-files-found: error` fails the job if audit evidence was not created.
          if-no-files-found: error
          # `retention-days` controls how long GitHub keeps this evidence artifact.
          retention-days: 30

      # This final step makes the auditability check fail when a required control failed.
      - name: Fail if a required control failed
        # This condition looks at the earlier job results and runs only when a control did not pass.
        if: needs.explainability.result != 'success' || needs.secret_prevention.result != 'success'
        # `run` executes shell commands on the temporary runner.
        run: |
          # This message explains why the workflow is failing the pull request.
          echo "One or more required security controls failed. See the enforcement evidence artifact."
          # `exit 1` marks this job as failed, which blocks merge when the check is required.
          exit 1
